app:
  astrometry:
    cpulimit_seconds: 30
    docker_image: astrometry-cli
    indices_path: /path/to/indices/5000/5200-LITE
    indices_series: 5200_LITE
    max_sources: 500
    max_width_degrees: 10
    min_sources_for_attempt: 4
    min_width_degrees: 0.1
    sip_refit_enabled: false
    sip_refit_order: 2
    tweak_order: 2
  calibrations:
    auto_apply_darks: false
    auto_apply_flats: false
    auto_remove_column_median: true
    auto_remove_row_median: true
    auto_scale_images: false
    auto_subtract_background: false
    background_box_size: 20
    background_exclude_percentile: 50.0
    background_filter_size: 3
    background_maxiters: 10
    background_sigma: 3.0
    clip_negative_after_dark: true
    dark_matching_headers:
    - XBINNING
    flat_matching_headers:
    - BINNING
    - FILTER
    master_darks_dir: null
    master_flats_dir: null
    max_dark_exposure_ratio: 1.5
    negative_clip_threshold: -1000
    oversample_threshold: 4.0
    scaling_method: median_filter
    target_fwhm: 3.0
  cors:
    allowed_origins:
    - http://localhost:8000
  debug: false
  detection:
    detect: true
    snr_threshold: 3.0
    verbose: false
  headers:
    exposure_time:
      exposure_time_keys:
      - EXPTIME
    observation_time:
      observation_time_keys:
      - DATE-OBS
    pointing:
      # burr writes boresight as plain RA/DEC keywords (float degrees), not
      # OBJCTRA/OBJCTDEC. CENTALT/CENTAZ are not present.
      az_alt_format: sexagesimal
      boresight_altitude_keys: []
      boresight_azimuth_keys: []
      ra_dec_format: float
      ra_units: degrees
      target_dec_keys:
      - DEC
      target_ra_keys:
      - RA
    site:
      altitude_unit: kilometers
      positional_format: sexagesimal
      site_altitude_keys:
      - SITEALT
      site_latitude_keys:
      - SITELAT
      site_longitude_keys:
      - SITELONG
    tracking:
      # burr's TRKMODE is always "rate" even on the residual-rate sidereal
      # leg of a multi-frame collect. The senpai-burr CLI patches TRKMODE
      # in-memory per the command log's intended_tracking_mode before
      # handing FITS to collect, so senpai's classifier sees the right
      # value. See _apply_intended_track_mode_overrides in senpai/cli/burr.py.
      track_mode_keys:
      - TRKMODE
      track_ra_rate_keys:
      - RA_RATE
      track_dec_rate_keys:
      - DEC_RATE
      # burr writes track rates in degrees/second.
      track_ra_rate_unit: degrees/second
      track_dec_rate_unit: degrees/second
  logging:
    level: info
  photometry:
    gain: 0.1
    include_read_noise: true
    max_crowding: 0.3
    min_snr: 3.0
    preferred_filters:
    - Johnson_V
    - Johnson_R
    - Sloan_r
    - Gaia_G
    - Sloan_g
    - Johnson_B
    read_noise: 1.0
    limiting_snr: 3.0
    limiting_completeness_fraction: 0.5
  plotting:
    debug: false
    review: true
    photometry: true
  star_catalog:
    type: sstrc7
    path: /path/to/sstrc7
    faint_limit: 18.0
  version: 0.1.0
